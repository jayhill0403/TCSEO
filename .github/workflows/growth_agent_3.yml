name: 24/7 TagCraft Automated Marketer - Bot 3

on:
  schedule:
    # Runs exactly at minute 15, every 4 hours
    - cron: '15 */4 * * *'
  workflow_dispatch: # This adds the manual "Run workflow" button

jobs:
  run-marketing-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Bot 3 Engine
        env:
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: python growth_agent_3.py

      - name: Commit and Push Generated Traffic Assets
        run: |
          git config --global user.name "TagCraftBot-3"
          git config --global user.email "bot3@tagcraftseo.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated marketing run complete (Bot 3) [skip ci]" && git push)
